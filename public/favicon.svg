<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="#ffffff" rx="8"/>
  
  <!-- Book -->
  <g transform="translate(12, 16)">
    <!-- Book spine -->
    <rect x="8" y="2" width="3" height="28" fill="#1f2937" rx="1"/>
    
    <!-- Left page -->
    <path d="M 2 2 L 11 2 L 11 30 L 2 30 Z" fill="#e5e7eb" stroke="#1f2937" stroke-width="1"/>
    <!-- Lines on left page -->
    <line x1="4" y1="8" x2="9" y2="8" stroke="#9ca3af" stroke-width="0.5"/>
    <line x1="4" y1="12" x2="9" y2="12" stroke="#9ca3af" stroke-width="0.5"/>
    <line x1="4" y1="16" x2="9" y2="16" stroke="#9ca3af" stroke-width="0.5"/>
    <line x1="4" y1="20" x2="9" y2="20" stroke="#9ca3af" stroke-width="0.5"/>
    <line x1="4" y1="24" x2="9" y2="24" stroke="#9ca3af" stroke-width="0.5"/>
    
    <!-- Right page -->
    <path d="M 11 2 L 20 2 L 20 30 L 11 30 Z" fill="#f3f4f6" stroke="#1f2937" stroke-width="1"/>
    <!-- Lines on right page -->
    <line x1="13" y1="8" x2="18" y2="8" stroke="#9ca3af" stroke-width="0.5"/>
    <line x1="13" y1="12" x2="18" y2="12" stroke="#9ca3af" stroke-width="0.5"/>
    <line x1="13" y1="16" x2="18" y2="16" stroke="#9ca3af" stroke-width="0.5"/>
    <line x1="13" y1="20" x2="18" y2="20" stroke="#9ca3af" stroke-width="0.5"/>
    <line x1="13" y1="24" x2="18" y2="24" stroke="#9ca3af" stroke-width="0.5"/>
  </g>
  
  <!-- Pen -->
  <g transform="translate(28, 14)">
    <!-- Pen body -->
    <rect x="0" y="6" width="3" height="18" fill="#f59e0b" rx="1.5"/>
    <!-- Pen tip -->
    <polygon points="1.5,24 0,26 3,26" fill="#1f2937"/>
    <!-- Pen clip -->
    <rect x="0.5" y="4" width="2" height="2.5" fill="#d97706" rx="0.5"/>
  </g>
</svg>